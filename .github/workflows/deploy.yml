name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/bulk-email-sender

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers
            docker compose -f docker-compose.prod.yml build --no-cache server worker client
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for postgres to be healthy
            sleep 10

            # Run SQL migration (safe - uses IF NOT EXISTS everywhere, never drops data)
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U $POSTGRES_USER -d $POSTGRES_DB -f /dev/stdin < scripts/migrate.sql

            # Seed admin (skips if already exists)
            docker compose -f docker-compose.prod.yml exec -T server node -e "
              const bcrypt = require('bcryptjs');
              const { Pool } = require('pg');
              const pool = new Pool({connectionString: process.env.DATABASE_URL});
              (async () => {
                const r = await pool.query('SELECT id FROM admin_users WHERE username = \$1', [process.env.ADMIN_USERNAME]);
                if (r.rows.length === 0) {
                  const hash = await bcrypt.hash(process.env.ADMIN_PASSWORD, 12);
                  await pool.query('INSERT INTO admin_users (username, password_hash) VALUES (\$1, \$2)', [process.env.ADMIN_USERNAME, hash]);
                  console.log('Admin seeded');
                } else { console.log('Admin exists'); }
                pool.end();
              })();
            "

            # Cleanup old images
            docker image prune -f

            echo "Deployment complete!"
